<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speedrun Leaderboard - Profil</title>
    <style>
        :root { --accent: #00ff88; --bg: #0d0d0d; --card: #1a1a1a; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; text-align: center; }
        header { padding: 30px; background: #222; border-bottom: 2px solid var(--accent); }
        .container { max-width: 1000px; margin: auto; padding: 20px; }
        
        .nav-btn { background: none; border: 1px solid var(--accent); color: var(--accent); padding: 10px 20px; cursor: pointer; border-radius: 5px; margin: 5px; }
        .nav-btn:hover { background: var(--accent); color: black; }

        .account-badge { background: #333; padding: 10px; border-radius: 20px; font-size: 0.9em; margin-bottom: 20px; display: inline-block; }
        
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #222; color: white; border: 1px solid #444; border-radius: 5px; box-sizing: border-box;}
        
        table { width: 100%; border-collapse: collapse; background: var(--card); margin-top: 20px; }
        th, td { padding: 15px; border-bottom: 1px solid #222; }
        .hidden { display: none; }
    </style>
</head>
<body>

<header>
    <h1>🏆 SPEEDRUN WORLD</h1>
    <div id="userDisplay" class="account-badge">Non connecté</div>
    <nav>
        <button class="nav-btn" onclick="show('leaderboard')">Classement</button>
        <button class="nav-btn" onclick="show('submit')">Envoyer un Run</button>
        <button class="nav-btn" id="btnAccount" onclick="show('account')">Créer un Compte</button>
    </nav>
</header>

<div class="container">

    <section id="leaderboard">
        <tbody id="rankingData"> </tbody>
        </section>

    <section id="account" class="hidden">
        <h2 id="accountTitle">Créer ton Profil</h2>
        <div id="accountForm">
            <input type="text" id="regPseudo" placeholder="Choisis un Pseudo">
            <input type="password" id="regPass" placeholder="Mot de passe">
            <select id="regCountry">
                <option value="France 🇫🇷">France 🇫🇷</option>
                <option value="Belgique 🇧🇪">Belgique 🇧🇪</option>
                <option value="Canada 🇨🇦">Canada 🇨🇦</option>
                <option value="Suisse 🇨🇭">Suisse 🇨🇭</option>
                <option value="Maroc 🇲🇦">Maroc 🇲🇦</option>
            </select>
            <button class="nav-btn" onclick="register()">S'enregistrer</button>
        </div>
        <div id="loggedInView" class="hidden">
            <p>Tu es connecté !</p>
            <button class="nav-btn" onclick="logout()">Se déconnecter</button>
        </div>
    </section>

    <section id="submit" class="hidden">
        <h2>Envoyer ton Record</h2>
        <p id="submitWarning" style="color: orange;">⚠️ Connecte-toi pour que ton pseudo soit pré-rempli !</p>
        <a href="TON_LIEN_GOOGLE_FORM" id="formLink" target="_blank" class="nav-btn">Accéder au Formulaire</a>
    </section>

</div>

<script>
    // --- GESTION DU COMPTE ---
    function register() {
        const user = {
            pseudo: document.getElementById('regPseudo').value,
            pays: document.getElementById('regCountry').value,
            pass: document.getElementById('regPass').value
        };
        if(user.pseudo && user.pass) {
            localStorage.setItem('speedrunUser', JSON.stringify(user));
            updateUI();
            alert("Compte créé !");
            show('leaderboard');
        }
    }

    function logout() {
        localStorage.removeItem('speedrunUser');
        updateUI();
    }

    function updateUI() {
        const user = JSON.parse(localStorage.getItem('speedrunUser'));
        const display = document.getElementById('userDisplay');
        const btnAcc = document.getElementById('btnAccount');
        
        if(user) {
            display.innerHTML = `👤 ${user.pseudo} (${user.pays})`;
            btnAcc.innerText = "Mon Compte";
            document.getElementById('accountForm').classList.add('hidden');
            document.getElementById('loggedInView').classList.remove('hidden');
            document.getElementById('submitWarning').innerHTML = "✅ Identifié en tant que " + user.pseudo;
        } else {
            display.innerHTML = "Non connecté";
            btnAcc.innerText = "Créer un Compte";
            document.getElementById('accountForm').classList.remove('hidden');
            document.getElementById('loggedInView').classList.add('hidden');
        }
    }

    function show(id) {
        document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    // Lancer au démarrage
    updateUI();
</script>

</body>
</html>
