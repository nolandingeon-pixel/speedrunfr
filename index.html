<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speedrun Leaderboard Officiel</title>
    <style>
        :root { --accent: #00ff88; --bg: #0d0d0d; --card: #1a1a1a; --text: #ffffff; --discord: #5865F2; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; text-align: center; }
        header { padding: 40px 20px; background: linear-gradient(180deg, #222, #0d0d0d); border-bottom: 3px solid var(--accent); }
        .container { max-width: 1000px; margin: auto; padding: 20px; }
        
        /* Navigation */
        .nav-btn { background: none; border: 1px solid var(--accent); color: var(--accent); padding: 10px 20px; cursor: pointer; border-radius: 5px; margin: 5px; font-weight: bold; transition: 0.3s; text-decoration: none; display: inline-block; }
        .nav-btn:hover { background: var(--accent); color: black; }
        
        /* Filtres Catégories */
        .filter-container { margin: 25px 0; display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; }
        .filter-btn { background: #222; border: 1px solid #444; color: white; padding: 8px 18px; cursor: pointer; border-radius: 20px; transition: 0.3s; }
        .filter-btn.active { background: var(--accent); color: black; border-color: var(--accent); font-weight: bold; }

        /* Tableau */
        .table-wrapper { background: var(--card); border-radius: 12px; overflow-x: auto; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background: #252525; padding: 18px; color: var(--accent); text-transform: uppercase; font-size: 0.85em; }
        td { padding: 16px; border-bottom: 1px solid #222; }
        tr:hover { background: #222; }
        
        .hidden { display: none; }
        .video-link { color: #00ccff; text-decoration: none; font-weight: bold; border: 1px solid #00ccff; padding: 5px 10px; border-radius: 4px; font-size: 0.8em; }
        
        /* Discord Card */
        .discord-card { background: #1e1e1e; padding: 30px; border-radius: 20px; border: 2px solid var(--discord); max-width: 500px; margin: 40px auto; }
        .discord-btn { background: var(--discord); color: white; border: none; padding: 15px 30px; font-size: 1.1em; border-radius: 8px; text-decoration: none; display: inline-block; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <h1>🏆 SPEEDRUN LEADERBOARD</h1>
    <nav>
        <button class="nav-btn" onclick="show('leaderboard')">CLASSEMENT</button>
        <button class="nav-btn" onclick="show('submit')">ENVOYER UN RUN</button>
    </nav>
</header>

<div class="container">
    
    <section id="leaderboard">
        <div class="filter-container" id="categoryFilters"></div>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Rang</th>
                        <th>Joueur</th>
                        <th>Jeu</th>
                        <th>Temps</th>
                        <th>Pays</th>
                        <th>Preuve</th>
                    </tr>
                </thead>
                <tbody id="rankingData">
                    <tr><td colspan="6">Chargement des records...</td></tr>
                </tbody>
            </table>
        </div>
    </section>

    <section id="submit" class="hidden">
        <div class="discord-card">
            <img src="https://cdn-icons-png.flaticon.com/512/5968/5968756.png" width="50" alt="Discord">
            <h2>Soumettre une Run</h2>
            <p>Rejoins notre Discord pour envoyer tes preuves par ticket privé !</p>
            <div style="text-align: left; background: #2a2a2a; padding: 15px; border-radius: 10px; margin: 20px 0; font-size: 0.9em;">
                <b>Infos requises :</b> Pseudo, Jeu, Temps exact et lien Vidéo.
            </div>
            <a href="https://discord.gg/qAes82FkRH" target="_blank" class="discord-btn">REJOINDRE LE DISCORD</a>
        </div>
    </section>
</div>

<script>
    // TON LIEN DE TABLEAU MIS À JOUR
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRHI5A1WYK_7ie1bHHHWhu9Lj74N99FdYNPgIV5ACOCnu294AGNj-3ElL8krYrv3PWVWDmUfqAGASeh/pub?output=csv";
    
    let allRuns = [];
    let currentCategory = "Tous";

    async function loadScores() {
        try {
            const response = await fetch(CSV_URL);
            const data = await response.text();
            const rows = data.split('\n').slice(1); 
            
            // On transforme le texte en tableau de données
            allRuns = rows.map(row => row.split(',')).filter(cols => cols.length >= 4);
            
            renderFilters();
            renderTable();
        } catch (e) { 
            document.getElementById('rankingData').innerHTML = "<tr><td colspan='6'>Erreur de connexion au tableau Google.</td></tr>"; 
        }
    }

    function renderFilters() {
        const filterContainer = document.getElementById('categoryFilters');
        if (!allRuns.length) return;
        
        const categories = ["Tous", ...new Set(allRuns.map(run => run[2].trim()))];
        filterContainer.innerHTML = "";
        
        categories.forEach(cat => {
            const btn = document.createElement('button');
            btn.className = `filter-btn ${currentCategory === cat ? 'active' : ''}`;
            btn.innerText = cat;
            btn.onclick = () => {
                currentCategory = cat;
                renderFilters();
                renderTable();
            };
            filterContainer.appendChild(btn);
        });
    }

    function renderTable() {
        const tableBody = document.getElementById('rankingData');
        tableBody.innerHTML = "";

        let filtered = currentCategory === "Tous" 
            ? allRuns 
            : allRuns.filter(run => run[2].trim() === currentCategory);

        // Tri par temps
        filtered.sort((a, b) => (a[3] || "99:99").localeCompare(b[3] || "99:99"));

        if(filtered.length === 0) {
            tableBody.innerHTML = "<tr><td colspan='6'>Aucun record affiché. Ajoute une ligne dans ton Google Sheets !</td></tr>";
            return;
        }

        filtered.forEach((cols, index) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${index + 1}</td>
                <td style="font-weight: bold;">${cols[1] || '---'}</td>
                <td><span style="background: #333; padding: 3px 8px; border-radius: 4px;">${cols[2] || '---'}</span></td>
                <td style="color: var(--accent); font-weight: bold;">${cols[3] || '---'}</td>
                <td>${cols[4] || '---'}</td>
                <td><a class="video-link" href="${cols[5]}" target="_blank">🎬 Voir</a></td>
            `;
            tableBody.appendChild(tr);
        });
    }

    function show(id) {
        document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        if(id === 'leaderboard') loadScores();
    }

    // Chargement initial
    loadScores();
    // Rafraîchir toutes les 2 minutes
    setInterval(loadScores, 120000);
</script>
</body>
</html>
