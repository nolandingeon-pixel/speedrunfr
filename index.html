<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speedrun Leaderboard - Catégories</title>
    <style>
        :root { --accent: #00ff88; --bg: #0d0d0d; --card: #1a1a1a; --text: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; text-align: center; }
        header { padding: 30px; background: linear-gradient(180deg, #222, #0d0d0d); border-bottom: 3px solid var(--accent); }
        .container { max-width: 1000px; margin: auto; padding: 20px; }
        
        /* Boutons de navigation principale */
        .nav-btn { background: none; border: 1px solid var(--accent); color: var(--accent); padding: 10px 20px; cursor: pointer; border-radius: 5px; margin: 5px; font-weight: bold; transition: 0.3s; text-decoration: none; display: inline-block; }
        .nav-btn:hover { background: var(--accent); color: black; }
        
        /* Boutons de Catégories (Jeux) */
        .filter-container { margin: 20px 0; display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; }
        .filter-btn { background: #222; border: 1px solid #444; color: white; padding: 8px 15px; cursor: pointer; border-radius: 20px; transition: 0.3s; }
        .filter-btn.active { background: var(--accent); color: black; border-color: var(--accent); font-weight: bold; }

        .account-badge { background: #333; padding: 8px 15px; border-radius: 20px; font-size: 0.85em; margin-bottom: 15px; display: inline-block; border: 1px solid #444; }
        table { width: 100%; border-collapse: collapse; background: var(--card); margin-top: 10px; border-radius: 10px; overflow: hidden; }
        th { background: #252525; padding: 15px; color: var(--accent); text-transform: uppercase; font-size: 0.9em; }
        td { padding: 15px; border-bottom: 1px solid #222; }
        tr:hover { background: #222; }
        
        .hidden { display: none; }
        .video-link { color: #00ccff; text-decoration: none; font-weight: bold; border: 1px solid #00ccff; padding: 4px 8px; border-radius: 4px; font-size: 0.8em; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #222; color: white; border: 1px solid #444; border-radius: 5px; box-sizing: border-box; }
    </style>
</head>
<body>

<header>
    <h1>🏆 SPEEDRUN LEADERBOARD</h1>
    <div id="userDisplay" class="account-badge">Non connecté</div>
    <nav>
        <button class="nav-btn" onclick="show('leaderboard')">CLASSEMENT</button>
        <button class="nav-btn" onclick="show('submit')">ENVOYER UN RUN</button>
        <button class="nav-btn" id="btnAccount" onclick="show('account')">MON COMPTE</button>
    </nav>
</header>

<div class="container">
    
    <section id="leaderboard">
        <div class="filter-container" id="categoryFilters">
            </div>

        <table>
            <thead>
                <tr>
                    <th>Rang</th>
                    <th>Joueur</th>
                    <th>Jeu</th>
                    <th>Temps</th>
                    <th>Pays</th>
                    <th>Preuve</th>
                </tr>
            </thead>
            <tbody id="rankingData">
                <tr><td colspan="6">Chargement des records...</td></tr>
            </tbody>
        </table>
    </section>

    <section id="account" class="hidden">
        <h2>Gestion du Profil</h2>
        <div id="accountForm">
            <input type="text" id="regPseudo" placeholder="Ton Pseudo">
            <select id="regCountry">
                <option value="France 🇫🇷">France 🇫🇷</option>
                <option value="Belgique 🇧🇪">Belgique 🇧🇪</option>
                <option value="Suisse 🇨🇭">Suisse 🇨🇭</option>
                <option value="Canada 🇨🇦">Canada 🇨🇦</option>
                <option value="Maroc 🇲🇦">Maroc 🇲🇦</option>
                <option value="Algérie 🇩🇿">Algérie 🇩🇿</option>
            </select>
            <button class="nav-btn" onclick="register()">S'INSCRIRE</button>
        </div>
        <div id="loggedInView" class="hidden">
            <p>Tu es connecté.</p>
            <button class="nav-btn" style="border-color: #ff4444; color: #ff4444;" onclick="logout()">SE DÉCONNECTER</button>
        </div>
    </section>

    <section id="submit" class="hidden">
        <h2>Soumettre un Speedrun</h2>
        <p id="submitMsg">Connecte-toi pour être identifié !</p>
        <br>
        <a href="https://docs.google.com/forms/d/e/1FAIpQLSdTzJABJDP5mwDCfqSw54aRxYFtsCqqJxXq8BdWksTA0y85sw/viewform?usp=header" target="_blank" class="nav-btn" style="background: var(--accent); color: black;">OUVRIR LE FORMULAIRE</a>
    </section>
</div>

<script>
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRHI5A1WYK_7ie1bHHHWhu9Lj74N99FdYNPgIV5ACOCnu294AGNj-3ElL8krYrv3PWVWDmUfqAGASeh/pub?output=csv";
    let allRuns = [];
    let currentCategory = "Tous";

    async function loadScores() {
        try {
            const response = await fetch(CSV_URL);
            const data = await response.text();
            const rows = data.split('\n').slice(1); 
            
            allRuns = rows.map(row => row.split(',')).filter(cols => cols.length >= 4);
            
            // Créer les filtres de catégories
            renderFilters();
            // Afficher le tableau
            renderTable();
            
        } catch (e) { 
            document.getElementById('rankingData').innerHTML = "<tr><td colspan='6'>Erreur de chargement.</td></tr>"; 
        }
    }

    function renderFilters() {
        const filterContainer = document.getElementById('categoryFilters');
        const categories = ["Tous", ...new Set(allRuns.map(run => run[2].trim()))];
        
        filterContainer.innerHTML = "";
        categories.forEach(cat => {
            const btn = document.createElement('button');
            btn.className = `filter-btn ${currentCategory === cat ? 'active' : ''}`;
            btn.innerText = cat;
            btn.onclick = () => {
                currentCategory = cat;
                renderFilters();
                renderTable();
            };
            filterContainer.appendChild(btn);
        });
    }

    function renderTable() {
        const tableBody = document.getElementById('rankingData');
        tableBody.innerHTML = "";

        // Filtrer par catégorie
        let filtered = currentCategory === "Tous" 
            ? allRuns 
            : allRuns.filter(run => run[2].trim() === currentCategory);

        // Trier par temps
        filtered.sort((a, b) => (a[3] || "99:99").localeCompare(b[3] || "99:99"));

        if(filtered.length === 0) {
            tableBody.innerHTML = "<tr><td colspan='6'>Aucun record dans cette catégorie.</td></tr>";
            return;
        }

        filtered.forEach((cols, index) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${index + 1}</td>
                <td><b>${cols[1] || '---'}</b></td>
                <td>${cols[2] || '---'}</td>
                <td style="color: var(--accent); font-weight: bold;">${cols[3] || '---'}</td>
                <td>${cols[4] || '---'}</td>
                <td><a class="video-link" href="${cols[5]}" target="_blank">🎬 Voir</a></td>
            `;
            tableBody.appendChild(tr);
        });
    }

    // Gestion du compte et Navigation (inchangé)
    function register() {
        const pseudo = document.getElementById('regPseudo').value;
        const pays = document.getElementById('regCountry').value;
        if(pseudo) {
            localStorage.setItem('speedrunUser', JSON.stringify({pseudo, pays}));
            updateUI();
            show('leaderboard');
        }
    }
    function logout() { localStorage.removeItem('speedrunUser'); updateUI(); }
    function updateUI() {
        const user = JSON.parse(localStorage.getItem('speedrunUser'));
        const display = document.getElementById('userDisplay');
        const msg = document.getElementById('submitMsg');
        if(user) {
            display.innerHTML = `👤 ${user.pseudo} (${user.pays})`;
            msg.innerHTML = `✅ Prêt, <b>${user.pseudo}</b> !`;
            document.getElementById('accountForm').classList.add('hidden');
            document.getElementById('loggedInView').classList.remove('hidden');
        } else {
            display.innerHTML = "Non connecté";
            msg.innerHTML = "⚠️ Connecte-toi d'abord.";
            document.getElementById('accountForm').classList.remove('hidden');
            document.getElementById('loggedInView').classList.add('hidden');
        }
    }
    function show(id) {
        document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        if(id === 'leaderboard') loadScores();
    }

    updateUI();
    loadScores();
</script>
</body>
</html>
